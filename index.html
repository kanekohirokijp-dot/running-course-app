<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>runywhere - ランニングコース生成</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-light: #E1F5EE; --green-mid: #5DCAA5;
  --blue: #378ADD; --text: #1a1a1a; --text-muted: #666;
  --border: rgba(0,0,0,0.1); --bg: #f7f8f5; --card: #ffffff; --radius: 16px;
}
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 16px 24px; display: flex; align-items: center; gap: 12px;
}
.logo {
  width: 36px; height: 36px; background: var(--green);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
.logo svg { width: 20px; height: 20px; fill: white; }
header h1 { font-size: 17px; font-weight: 600; }
header p { font-size: 12px; color: var(--text-muted); }
main { max-width: 520px; margin: 0 auto; padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 16px; }
.card { background: var(--card); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); }
.card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
.dist-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.dist-btn {
  padding: 8px 20px; border-radius: 100px; border: 1.5px solid var(--border);
  background: transparent; font-family: 'Outfit', sans-serif; font-size: 14px;
  font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.15s;
}
.dist-btn.active { background: var(--green); color: white; border-color: var(--green); }
.dist-btn:hover:not(.active) { background: var(--green-light); border-color: var(--green-mid); }
.custom-row { display: flex; align-items: center; gap: 8px; }
.custom-row input {
  width: 100px; padding: 8px 12px; border-radius: 10px;
  border: 1.5px solid var(--border); font-family: 'Outfit', sans-serif;
  font-size: 14px; background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.custom-row input:focus { border-color: var(--green); }
.custom-row span { font-size: 14px; color: var(--text-muted); }
.tags { display: flex; flex-wrap: wrap; gap: 8px; }
.tag {
  padding: 7px 14px; border-radius: 100px; border: 1.5px solid var(--border);
  font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.tag.active { background: var(--green-light); color: #0F6E56; border-color: var(--green-mid); font-weight: 500; }
#map { height: 360px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
#generate-btn {
  width: 100%; padding: 16px; background: var(--green); color: white;
  border: none; border-radius: var(--radius); font-family: 'Outfit', sans-serif;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
#generate-btn:hover { background: #0F6E56; }
#generate-btn:active { transform: scale(0.98); }
#generate-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }
.status { text-align: center; font-size: 13px; color: var(--text-muted); min-height: 20px; }
.status.error { color: #c0392b; }
.status.success { color: var(--green); font-weight: 500; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat { background: var(--green-light); border-radius: 12px; padding: 14px; text-align: center; }
.stat-label { font-size: 11px; color: #0F6E56; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 600; color: #085041; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
  </div>
  <div>
    <h1>runywhere</h1>
    <p>旅行先・出張先でも即座にコース作成</p>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-title">距離</div>
    <div class="dist-buttons">
      <button class="dist-btn active" data-km="3">3 km</button>
      <button class="dist-btn" data-km="5">5 km</button>
      <button class="dist-btn" data-km="10">10 km</button>
    </div>
    <div class="custom-row">
      <input type="number" id="custom-km" placeholder="自由入力" min="1" max="50" step="0.5" />
      <span>km</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">コースの条件</div>
    <div class="tags">
      <div class="tag active" id="tag-park">🌿 公園・緑道優先</div>
      <div class="tag active" id="tag-loop">🔄 周回コース</div>
      <div class="tag active" id="tag-flat">📉 高低差少なめ</div>
      <div class="tag active" id="tag-signal">🚦 信号少なめ</div>
    </div>
  </div>

  <div id="map"></div>

  <button id="generate-btn">現在地からコースを生成</button>

  <div class="status" id="status"></div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-label">距離</div><div class="stat-value" id="stat-dist">-</div></div>
    <div class="stat"><div class="stat-label">予想タイム</div><div class="stat-value" id="stat-time">-</div></div>
    <div class="stat"><div class="stat-label">獲得標高</div><div class="stat-value" id="stat-elev">-</div></div>
  </div>
</main>

<script>
// ★ここにAPIキーを貼り付けてください★
const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjdhNDI0MDdjOGNkMjQ2M2ViYjRjODg1OTA3YmQ4OWI0IiwiaCI6Im11cm11cjY0In0=';

let map, userMarker, routeLayer, markerLayer;
let userLat = null, userLng = null;
let selectedKm = 3;

function initMap(lat, lng) {
  if (map) { map.setView([lat, lng], 14); return; }
  map = L.map('map').setView([lat, lng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

document.querySelectorAll('.dist-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dist-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedKm = parseFloat(btn.dataset.km);
    document.getElementById('custom-km').value = '';
  });
});

document.getElementById('custom-km').addEventListener('input', e => {
  if (e.target.value) {
    document.querySelectorAll('.dist-btn').forEach(b => b.classList.remove('active'));
    selectedKm = parseFloat(e.target.value) || 3;
  }
});

document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', () => tag.classList.toggle('active'));
});

// 周回コース用のウェイポイントを生成（現在地を中心に等間隔に配置）
function generateWaypoints(lat, lng, radiusM, count) {
  const points = [[lng, lat]]; // ORS は [lng, lat] の順
  for (let i = 1; i <= count; i++) {
    const angle = (i / (count + 1)) * 2 * Math.PI;
    const dlat = (radiusM * Math.sin(angle)) / 111000;
    const dlng = (radiusM * Math.cos(angle)) / (111000 * Math.cos(lat * Math.PI / 180));
    points.push([lng + dlng, lat + dlat]);
  }
  points.push([lng, lat]); // スタート地点に戻る
  return points;
}

async function generateCourse() {
  if (ORS_API_KEY === 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjdhNDI0MDdjOGNkMjQ2M2ViYjRjODg1OTA3YmQ4OWI0IiwiaCI6Im11cm11cjY0In0=') {
    setStatus('APIキーを設定してください。index.html の ORS_API_KEY を書き換えてください。', 'error');
    return;
  }

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  setStatus('コースを計算中...');
  document.getElementById('stats').style.display = 'none';

  const targetM = selectedKm * 1000;
  const radius = targetM / (2 * Math.PI) * 0.9;
  const waypointCount = selectedKm <= 3 ? 3 : selectedKm <= 5 ? 4 : 6;
  const waypoints = generateWaypoints(userLat, userLng, radius, waypointCount);

  // コースの条件に応じてプロファイルを選択
  const preferSignal = document.getElementById('tag-signal').classList.contains('active');
  const profile = preferSignal ? 'foot-walking' : 'foot-walking';

  // 高低差少なめの場合はオプションを追加
  const preferFlat = document.getElementById('tag-flat').classList.contains('active');

  try {
    const body = {
      coordinates: waypoints,
      preference: preferFlat ? 'shortest' : 'recommended',
      units: 'km',
      elevation: true,
      instructions: false
    };

    const res = await fetch(`https://api.openrouteservice.org/v2/directions/${profile}/geojson`, {
      method: 'POST',
      headers: {
        'Authorization': ORS_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await res.json();
    const coords = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
    const summary = data.features[0].properties.summary;

    drawRoute(coords);

    const distKm = summary.distance.toFixed(2);
    const mins = Math.round(summary.distance * 6);
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    const timeStr = h > 0 ? `${h}時間${m}分` : `${m}分`;
    const elev = Math.round(data.features[0].properties.ascent || 0);

    document.getElementById('stat-dist').textContent = distKm + ' km';
    document.getElementById('stat-time').textContent = timeStr;
    document.getElementById('stat-elev').textContent = '+' + elev + 'm';
    document.getElementById('stats').style.display = 'grid';
    setStatus('コースを生成しました！', 'success');

  } catch (e) {
    console.error(e);
    setStatus('コース生成に失敗しました: ' + e.message, 'error');
  }

  btn.disabled = false;
}

function drawRoute(coords) {
  if (routeLayer) map.removeLayer(routeLayer);
  if (markerLayer) map.removeLayer(markerLayer);
  routeLayer = L.polyline(coords, { color: '#1D9E75', weight: 5, opacity: 0.9 }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
  markerLayer = L.layerGroup().addTo(map);
  L.circleMarker(coords[0], { radius: 11, fillColor: '#1D9E75', color: '#fff', weight: 3, fillOpacity: 1 })
    .bindPopup('スタート / ゴール').addTo(markerLayer);
}

document.getElementById('generate-btn').addEventListener('click', () => {
  if (!userLat) {
    setStatus('位置情報を取得中...');
    navigator.geolocation.getCurrentPosition(
      pos => {
        userLat = pos.coords.latitude; userLng = pos.coords.longitude;
        initMap(userLat, userLng);
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([userLat, userLng], {
          radius: 9, fillColor: '#378ADD', color: '#fff', weight: 2.5, fillOpacity: 1
        }).addTo(map).bindPopup('現在地').openPopup();
        generateCourse();
      },
      () => {
        userLat = 35.6812; userLng = 139.7671;
        setStatus('位置情報を取得できませんでした。東京駅周辺でデモを表示します。');
        initMap(userLat, userLng);
        userMarker = L.circleMarker([userLat, userLng], {
          radius: 9, fillColor: '#378ADD', color: '#fff', weight: 2.5, fillOpacity: 1
        }).addTo(map);
        generateCourse();
      },
      { timeout: 8000, enableHighAccuracy: true }
    );
  } else {
    generateCourse();
  }
});

initMap(35.6812, 139.7671);
</script>
</body>
</html>
